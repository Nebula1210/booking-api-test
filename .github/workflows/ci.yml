name: Run API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with Allure
        run: |
          pytest -v --alluredir=./reports/allure_raw

      - name: Install Allure
        run: |
          # 使用 curl 下载，并添加重试机制
          for i in 1 2 3; do
            curl -s -L -o /tmp/allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz && break || sleep 3
          done
          tar xzf /tmp/allure.tgz -C /tmp
          sudo mv /tmp/allure-2.29.0/bin/allure /usr/local/bin/

      - name: Generate Allure Report
        run: |
          allure generate ./reports/allure_raw -o ./reports/allure_report --clean

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: ./reports/allure_report
          retention-days: 7