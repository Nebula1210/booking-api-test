name: Run API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with Allure
        run: |
          pytest -v --alluredir=./reports/allure_raw

      - name: Install Allure
        run: |
          sudo apt-get update
          sudp apt-get install -y wget
          wget -q0- https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.1.tgz | tar -xz -C /tmp
          sudo ln -s /tmp/allure-2.29.0/bin/allure /usr/local/bin/allure

      - name: Generate Allure Report
        run: |
          allure generate ./reports/allure_raw -o ./reports/allure_report --clean

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: ./reports/allure_report
          retention-days: 7